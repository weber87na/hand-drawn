<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>聯佳汽車 | 新北市五股區修車廠</title>
  <meta name="description" content="本店擅修品牌: Honda, Lexus, Toyota, 三菱, BMW, Benz">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <main class="container">
    <header class="title" id="title">
      <div class="title-frame">
        <button class="nav-hit nav-home" type="button" data-target="main" aria-label="首頁"></button>
        <button class="nav-hit nav-about" type="button" data-target="about" aria-label="關於聯佳"></button>
        <button class="nav-hit nav-service" type="button" data-target="service" aria-label="服務項目"></button>
        <button class="nav-hit nav-brands" type="button" data-target="repair-brands" aria-label="擅修車種"></button>
        <a class="nav-hit nav-link" href="https://www.carce.cc/garage/1052" aria-label="車勢店家頁"></a>
        <picture>
          <source media="(max-width: 720px)" srcset="img/mobile-title.png">
          <img src="img/title.png" alt="聯佳汽車導覽">
        </picture>
      </div>
    </header>

    <section class="panel active" id="main">
      <picture>
        <source media="(max-width: 720px)" srcset="img/mobile-main.png">
        <img src="img/main.png" alt="聯佳汽車首頁">
      </picture>
    </section>

    <section class="panel" id="about">
      <picture>
        <source media="(max-width: 720px)" srcset="img/mobile-about.png">
        <img src="img/about.png" alt="聯佳汽車關於我們">
      </picture>
    </section>

    <section class="panel" id="service">
      <picture>
        <source media="(max-width: 720px)" srcset="img/mobile-service.png">
        <img src="img/service.png" alt="聯佳汽車服務項目">
      </picture>
      <a class="promo-link wash" href="https://shop.carce.cc/index.php?route=product/category&amp;path=175_165_238" aria-label="前往洗車用品頁"></a>
    </section>

    <section class="panel" id="repair-brands">
      <picture>
        <source media="(max-width: 720px)" srcset="img/mobile-repair-brands.png">
        <img src="img/repair-brands.png" alt="聯佳汽車擅修車種">
      </picture>
      <a class="promo-link carce" href="https://www.carce.cc" aria-label="前往車勢網站"></a>
    </section>
  </main>

  <script src="js/main.js"></script>
</body>
</html>
