<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>聯佳汽車 | 新北市五股區修車廠</title>
  <meta name="description" content="本店擅修品牌: Honda, Lexus, Toyota, 三菱, BMW, Benz">
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      overflow-x: hidden;
      background: #f9f9f9;
      color: #222;
      font-family: Arial, "Microsoft JhengHei", sans-serif;
    }

    .container {
      position: relative;
      width: 100%;
      max-width: 1000px;
      margin: 0 auto;
    }

    .title {
      position: sticky;
      top: 0;
      z-index: 10;
      background: #f9f9f9;
    }

    .title-frame,
    .panel {
      position: relative;
    }

    img {
      display: block;
      width: 100%;
      height: auto;
    }

    .nav-hit,
    .promo-link {
      position: absolute;
      z-index: 2;
      border: 0;
      padding: 0;
      background: transparent;
      cursor: pointer;
    }

    .nav-hit {
      top: 54%;
      height: 42%;
    }

    .nav-hit:focus-visible {
      outline: 3px solid #d1272f;
      outline-offset: -3px;
    }

    .nav-home {
      left: 0;
      top: 0;
      width: 58%;
      height: 52%;
    }

    .nav-about {
      left: 0;
      width: 26%;
    }

    .nav-service {
      left: 26%;
      width: 24%;
    }

    .nav-fix {
      left: 50%;
      width: 24%;
    }

    .nav-link {
      left: 74%;
      width: 26%;
    }

    .panel {
      display: none;
    }

    .panel.active {
      display: block;
    }

    .wash {
      left: 2%;
      top: 25%;
      width: 18%;
      height: 18%;
    }

    .carce {
      left: 66%;
      top: 18%;
      width: 32%;
      height: 12%;
    }

    @media (max-width: 720px) {
      body,
      .title {
        background: #fff;
      }

      .container {
        max-width: none;
      }

      .title {
        box-shadow: 0 1px 0 rgba(0, 0, 0, 0.08);
      }

      .nav-home {
        left: 0;
        top: 0;
        width: 100%;
        height: 47%;
      }

      .nav-hit {
        top: 47%;
        height: 53%;
      }

      .nav-about {
        left: 0;
        width: 25%;
      }

      .nav-service {
        left: 25%;
        width: 25%;
      }

      .nav-fix {
        left: 50%;
        width: 25%;
      }

      .nav-link {
        left: 75%;
        width: 25%;
      }

      .wash {
        left: 6%;
        top: auto;
        bottom: 22px;
        width: 88%;
        height: 150px;
      }

      .carce {
        left: 6%;
        top: auto;
        bottom: 250px;
        width: 88%;
        height: 120px;
      }
    }
  </style>
</head>
<body>
  <main class="container">
    <header class="title" id="title">
      <div class="title-frame">
        <button class="nav-hit nav-home" type="button" data-target="img1" aria-label="首頁"></button>
        <button class="nav-hit nav-about" type="button" data-target="img2" aria-label="關於聯佳"></button>
        <button class="nav-hit nav-service" type="button" data-target="img3" aria-label="服務項目"></button>
        <button class="nav-hit nav-fix" type="button" data-target="img4" aria-label="擅修車種"></button>
        <a class="nav-hit nav-link" href="https://www.carce.cc/garage/1052" aria-label="車勢店家頁"></a>
        <picture>
          <source media="(max-width: 720px)" srcset="mobile-title.jpg">
          <img src="title.jpg" alt="聯佳汽車導覽">
        </picture>
      </div>
    </header>

    <section class="panel active" id="img1">
      <picture>
        <source media="(max-width: 720px)" srcset="mobile-img1.png">
        <img src="img1.jpg" alt="聯佳汽車關於我們">
      </picture>
    </section>

    <section class="panel" id="img2">
      <picture>
        <source media="(max-width: 720px)" srcset="mobile-img2.png">
        <img src="img2.jpg" alt="聯佳汽車介紹">
      </picture>
    </section>

    <section class="panel" id="img3">
      <picture>
        <source media="(max-width: 720px)" srcset="mobile-img13.png">
        <img src="img13.jpg" alt="聯佳汽車服務項目">
      </picture>
      <a class="promo-link wash" href="https://shop.carce.cc/index.php?route=product/category&amp;path=175_165_238" aria-label="前往洗車用品頁"></a>
    </section>

    <section class="panel" id="img4">
      <picture>
        <source media="(max-width: 720px)" srcset="mobile-img14.png">
        <img src="img14.jpg" alt="聯佳汽車擅修車種">
      </picture>
      <a class="promo-link carce" href="https://www.carce.cc" aria-label="前往車勢網站"></a>
    </section>
  </main>

  <script>
    const panels = Array.from(document.querySelectorAll(".panel"));
    const buttons = Array.from(document.querySelectorAll("[data-target]"));

    function showPanel(id) {
      panels.forEach((panel) => {
        panel.classList.toggle("active", panel.id === id);
      });
      if (location.hash !== `#${id}`) {
        history.replaceState(null, "", `#${id}`);
      }
    }

    buttons.forEach((button) => {
      button.addEventListener("click", () => showPanel(button.dataset.target));
    });

    const initial = location.hash.slice(1);
    showPanel(panels.some((panel) => panel.id === initial) ? initial : "img1");
  </script>
</body>
</html>
