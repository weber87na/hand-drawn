<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>青春好肌動 | 健康餐</title>
  <meta name="description" content="青春好肌動健康餐，均衡營養、少油少鹽少糖，陪你把健康變日常。">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <main class="container">
    <header class="title">
      <div class="title-frame">
        <button class="nav-hit nav-about" type="button" data-target="about" aria-label="關於我們"></button>
        <button class="nav-hit nav-pricing" type="button" data-target="pricing" aria-label="定價方案"></button>
        <button class="nav-hit nav-ingredients" type="button" data-target="ingredients" aria-label="成分簡介"></button>
        <button class="nav-hit nav-philosophy" type="button" data-target="philosophy" aria-label="品牌理念"></button>
        <picture>
          <source media="(max-width: 720px)" srcset="img/mobile-title.png">
          <img src="img/title.png" alt="青春好肌動導覽">
        </picture>
      </div>
    </header>

    <section class="panel active" id="about">
      <picture>
        <source media="(max-width: 720px)" srcset="img/mobile-about.png">
        <img src="img/about.png" alt="青春好肌動關於我們">
      </picture>
    </section>

    <section class="panel" id="pricing">
      <picture>
        <source media="(max-width: 720px)" srcset="img/mobile-pricing.png">
        <img src="img/pricing.png" alt="青春好肌動定價方案">
      </picture>
    </section>

    <section class="panel" id="ingredients">
      <picture>
        <source media="(max-width: 720px)" srcset="img/mobile-ingredients.png">
        <img src="img/ingredients.png" alt="青春好肌動成分簡介">
      </picture>
    </section>

    <section class="panel" id="philosophy">
      <picture>
        <source media="(max-width: 720px)" srcset="img/mobile-philosophy.png">
        <img src="img/philosophy.png" alt="青春好肌動品牌理念">
      </picture>
    </section>
  </main>

  <script src="js/main.js"></script>
</body>
</html>
